# =============================================================================
# Render Blueprint — PR Preview Environments
# =============================================================================
# This file defines the six "base" services that Render uses as the template
# for ephemeral PR-preview environments. PRs that include `[render preview]`
# in their title spawn a complete clone of every resource (services, db, redis)
# into a new Render Environment.
#
# Lifecycle:
#   1. Sync this blueprint into the discovita > Previews environment in the
#      Render dashboard (one-time).
#   2. Render creates the six base services (always-on; lowest tier).
#   3. When a teammate opens or pushes to a PR with `[render preview]` in the
#      title, Render clones the entire blueprint into a new Preview Environment
#      for that PR. Note: the PR must change at least one file inside a
#      service's rootDir (server/, client/, docs/) for the trigger to fire —
#      root-only changes (README.md, render.yaml) won't trigger.
#   4. The preview API service runs `pg_dump` of staging into the preview's
#      ephemeral Postgres during preDeploy, then runs migrations from the PR
#      branch.
#   5. The preview frontend builds with VITE_COACH_BASE_URL pointing at the
#      preview's own API URL (wired by Render's fromService ref).
#   6. The PR's GitHub Deployments section shows the preview URL — click
#      "View deployment" next to the web service.
#   7. When the PR is merged or closed, Render auto-destroys the entire
#      preview environment.
#
# Secrets to set ONCE in the Render dashboard after first sync (on the
# preview-shared-secrets envVarGroup, not on individual services). Values
# defined here propagate to every preview environment automatically — unlike
# per-service `sync: false` vars, which Render deliberately does NOT copy
# into preview instances.
#   - STAGING_DATABASE_URL    (full postgres:// URL of staging-coach-database)
#   - DJANGO_SECRET_KEY       (any random string; previews don't need to share
#                              with prod)
#   - AWS_ACCESS_KEY_ID       (same as staging — see staging dashboard)
#   - AWS_SECRET_ACCESS_KEY   (same as staging)
#   - AWS_SES_REGION_NAME, AWS_SES_REGION_ENDPOINT, AWS_SES_SOURCE_EMAIL
#     (same as staging)
# =============================================================================

# Top-level previews block enables the Preview Environments feature: every PR
# with `[render preview]` in its title spawns a complete clone of every
# resource in this blueprint (services, database, key-value) into a new
# environment. Manual generation means previews only spin up when explicitly
# requested via the title tag, not on every PR.
#
# Preview Environments require a Render Pro plan or higher.
previews:
  generation: manual

# NOTE on env groups and previews:
# The shared env group `preview-shared-secrets` is referenced below from the
# api and worker services, but it is intentionally NOT declared in this
# blueprint. Per Render's docs:
#
#   "Placeholder environment variables defined with `sync: false` are not
#    copied to preview environments. To share secret variables across
#    preview environments: 1. Manually create an environment group in the
#    Dashboard. 2. Add one or more environment variables. 3. Reference the
#    environment group in your render.yaml file, as needed."
#
# In other words, blueprint-managed env groups have the same sync:false
# propagation problem as per-service vars — only DASHBOARD-CREATED groups
# are inherited by preview instances. So `preview-shared-secrets` must
# exist in the workspace as a manually-created env group, populated with:
#
#   PYTHON_VERSION              = 3.11.10
#   DJANGO_SETTINGS_MODULE      = settings.previews
#   DJANGO_SECRET_KEY           (random string)
#   STAGING_DATABASE_URL        (full postgres:// URL of staging-coach-database)
#   AWS_ACCESS_KEY_ID           (same as staging)
#   AWS_SECRET_ACCESS_KEY       (same as staging)
#   AWS_REGION                  = us-east-1
#   AWS_SES_REGION_NAME         (same as staging)
#   AWS_SES_REGION_ENDPOINT     (same as staging)
#   AWS_SES_SOURCE_EMAIL        (same as staging)
#   STAGING_AWS_STORAGE_BUCKET_NAME = discovita-dev-coach-staging

databases:
  - name: preview-coach-database
    region: oregon
    # Base service stays on basic-256mb — it's just the template, never
    # serves real traffic. Previews use basic-1gb because basic-256mb
    # consistently OOMs / drops its connection partway through restoring
    # the staging dump (after ~11 tables, before the users table).
    plan: basic-256mb
    previewPlan: basic-1gb
    postgresMajorVersion: "17"

services:
  # ---------------------------------------------------------------------------
  # Django API (web)
  # ---------------------------------------------------------------------------
  - type: web
    name: preview-coach-api
    runtime: python
    region: oregon
    plan: starter
    rootDir: server
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    # preDeployCommand runs after build, in the runtime environment where the
    # preview DB is fully provisioned and reachable. Running pg_dump | psql in
    # buildCommand was unreliable because the build container's connectivity
    # to the freshly-created preview DB is racy — the dump would start, COPY
    # a few tables, then drop the SSL connection mid-stream.
    #
    # The retry loop handles two distinct races:
    #   1. Fresh Postgres takes ~1-2 min to accept connections after creation.
    #   2. After pg_dump's --clean rebuilds the schema, the small basic-256mb
    #      DB briefly enters "starting up" mode and rejects connections with
    #      "FATAL: the database system is starting up" — different from
    #      Connection refused. Need to wait both before AND after the dump.
    preDeployCommand: |
      set -euo pipefail
      wait_for_db() {
        for i in 1 2 3 4 5 6 7 8; do
          if psql "$PREVIEW_DATABASE_URL" -c 'SELECT 1' >/dev/null 2>&1; then
            echo "Preview DB is ready (attempt $i)"
            return 0
          fi
          echo "Preview DB not ready (attempt $i/8), waiting 15s..."
          sleep 15
        done
        echo "Preview DB never came up after 2 minutes"
        return 1
      }
      wait_for_db
      # Dump staging to a local file first, then restore from the file. The
      # previous streaming `pg_dump | psql` approach kept two SSL connections
      # open simultaneously and consistently dropped one of them mid-transfer.
      # Buffering through a file means each connection only has to stay open
      # for ONE side of the transfer.
      #
      # --exclude-table-data on identities_identityimagechat: that table holds
      # Gemini multi-turn chat history with full-res images base64-encoded
      # inline (~157 MB across a few rows, one row ~70 MB). Restoring a 70 MB
      # COPY row into the basic-256mb preview Postgres exhausts memory and drops
      # the connection mid-restore ("SSL error: unexpected eof while reading").
      # Because pg_dump emits PRIMARY KEY / constraint statements AFTER all COPY
      # data, a mid-COPY death leaves restored tables without their PKs, and the
      # next `migrate` then fails creating FKs ("no unique constraint matching
      # given keys for referenced table chat_messages_chatmessage"). We skip
      # only this table's DATA — its schema is kept, and previews don't need the
      # transient chat blobs.
      #
      # ON_ERROR_STOP=1 (plus `set -e` above) makes a partial restore abort the
      # deploy loudly instead of silently migrating onto a half-loaded DB.
      pg_dump "$STAGING_DATABASE_URL" --no-owner --no-acl --clean --if-exists \
        --exclude-table-data='public.identities_identityimagechat' -f /tmp/staging-dump.sql
      psql "$PREVIEW_DATABASE_URL" -v ON_ERROR_STOP=1 -f /tmp/staging-dump.sql
      rm -f /tmp/staging-dump.sql
      wait_for_db
      python manage.py migrate --noinput
    startCommand: gunicorn asgi:application --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 600 --workers 2
    envVars:
      # Shared secrets / Python pin / settings module / AWS / SES — see the
      # preview-shared-secrets envVarGroup at the top of this file.
      - fromGroup: preview-shared-secrets
      # Per-PR S3 prefix so previews never collide with each other or with
      # real staging data. RENDER_GIT_PR_NUMBER is auto-set on previews and
      # empty on the base service (which is fine — base service doesn't
      # serve real upload traffic).
      - key: S3_LOCATION_PREFIX
        value: previews/pr-${RENDER_GIT_PR_NUMBER}/media
      # Preview DB — wired in five forms because previews.py reads them
      # individually and the build script needs the URL for pg_dump dest.
      - key: PREVIEW_DATABASE_URL
        fromDatabase:
          name: preview-coach-database
          property: connectionString
      - key: PREVIEW_DB_NAME
        fromDatabase:
          name: preview-coach-database
          property: database
      - key: PREVIEW_DB_USER
        fromDatabase:
          name: preview-coach-database
          property: user
      - key: PREVIEW_DB_PASSWORD
        fromDatabase:
          name: preview-coach-database
          property: password
      - key: PREVIEW_DB_HOST
        fromDatabase:
          name: preview-coach-database
          property: host
      - key: PREVIEW_DB_PORT
        fromDatabase:
          name: preview-coach-database
          property: port
      # Redis (Valkey) — Celery broker for the sentinel worker.
      - key: PREVIEW_REDIS_URL
        fromService:
          name: preview-coach-redis
          type: keyvalue
          property: connectionString
      # FRONTEND_URL is intentionally unset for previews. Render's
      # fromService property: host doesn't resolve for static-site refs,
      # and previews don't need real password-reset email links —
      # common.py defaults FRONTEND_URL to "" which is acceptable here.

  # ---------------------------------------------------------------------------
  # Sentinel — Celery worker for user-note extraction
  # ---------------------------------------------------------------------------
  # Same image as the api, different start command. Memory hygiene flags
  # come from CELERY_WORKER_* settings in server/settings/common.py.
  - type: worker
    name: preview-coach-sentinel
    runtime: python
    region: oregon
    plan: starter
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A celery_config worker --loglevel=INFO
    envVars:
      - fromGroup: preview-shared-secrets
      - key: S3_LOCATION_PREFIX
        value: previews/pr-${RENDER_GIT_PR_NUMBER}/media
      - key: PREVIEW_DB_NAME
        fromDatabase:
          name: preview-coach-database
          property: database
      - key: PREVIEW_DB_USER
        fromDatabase:
          name: preview-coach-database
          property: user
      - key: PREVIEW_DB_PASSWORD
        fromDatabase:
          name: preview-coach-database
          property: password
      - key: PREVIEW_DB_HOST
        fromDatabase:
          name: preview-coach-database
          property: host
      - key: PREVIEW_DB_PORT
        fromDatabase:
          name: preview-coach-database
          property: port
      - key: PREVIEW_REDIS_URL
        fromService:
          name: preview-coach-redis
          type: keyvalue
          property: connectionString

  # ---------------------------------------------------------------------------
  # Frontend — Vite/React static site
  # ---------------------------------------------------------------------------
  # VITE_* env vars are baked into the bundle at build time; we export them
  # before `npm run build` so each preview's bundle points at its own API.
  - type: web
    name: preview-coach-frontend
    runtime: static
    rootDir: client
    buildCommand: |
      # Render's fromService property: host returns just the service slug
      # (e.g. "preview-coach-api-pr-78"), not the full hostname. Append
      # .onrender.com so VITE_COACH_BASE_URL is a valid URL the browser
      # can resolve.
      export VITE_COACH_BASE_URL="https://${PREVIEW_API_HOST}.onrender.com/api/v1"
      export VITE_ENV=preview
      npm install
      npm run build
    staticPublishPath: dist
    # SPA route rewrite — without this, refreshing a non-root URL
    # (e.g. /dashboard) would 404 instead of being handled by client routing.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: PREVIEW_API_HOST
        fromService:
          name: preview-coach-api
          type: web
          property: host

  # ---------------------------------------------------------------------------
  # Docs — Docusaurus static site
  # ---------------------------------------------------------------------------
  - type: web
    name: preview-coach-docs
    runtime: static
    rootDir: docs
    buildCommand: |
      npm install
      npm run build
    staticPublishPath: build

  # ---------------------------------------------------------------------------
  # Redis (Valkey) — Celery broker
  # ---------------------------------------------------------------------------
  - type: keyvalue
    name: preview-coach-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
