# =============================================================================
# Render Blueprint — PR Preview Environments
# =============================================================================
# This file defines the six "base" services that Render uses as the template
# for ephemeral PR-preview environments. PRs that include `[render preview]`
# in their title spawn a complete clone of every resource (services, db, redis)
# into a new Render Environment.
#
# Lifecycle:
#   1. Sync this blueprint into the discovita > Previews environment in the
#      Render dashboard (one-time).
#   2. Render creates the six base services (always-on; lowest tier).
#   3. When a teammate edits a PR title to include `[render preview]`, Render
#      clones the entire blueprint into a new Preview Environment for that PR.
#   4. The preview API service runs `pg_dump` of staging into the preview's
#      ephemeral Postgres during preDeploy, then runs migrations from the PR
#      branch.
#   5. The preview frontend builds with VITE_COACH_BASE_URL pointing at the
#      preview's own API URL (wired by Render's fromService ref).
#   6. The PR's GitHub Deployments section shows the preview URL — click
#      "View deployment" next to the web service.
#   7. When the PR is merged or closed, Render auto-destroys the entire
#      preview environment.
#
# Secrets to set in the Render dashboard once after first sync:
#   - STAGING_DATABASE_URL    (full postgres:// URL of staging-coach-database)
#   - DJANGO_SECRET_KEY       (any random string; previews don't need to share
#                              with prod)
#   - AWS_ACCESS_KEY_ID       (same as staging — see staging dashboard)
#   - AWS_SECRET_ACCESS_KEY   (same as staging)
#   - AWS_SES_REGION_NAME, AWS_SES_REGION_ENDPOINT, AWS_SES_SOURCE_EMAIL
#     (same as staging)
# =============================================================================

# Top-level previews block enables the Preview Environments feature: every PR
# with `[render preview]` in its title spawns a complete clone of every
# resource in this blueprint (services, database, key-value) into a new
# environment. Manual generation means previews only spin up when explicitly
# requested via the title tag, not on every PR.
#
# Preview Environments require a Render Pro plan or higher.
previews:
  generation: manual

databases:
  - name: preview-coach-database
    region: oregon
    plan: basic-256mb
    postgresMajorVersion: "17"

services:
  # ---------------------------------------------------------------------------
  # Django API (web)
  # ---------------------------------------------------------------------------
  - type: web
    name: preview-coach-api
    runtime: python
    region: oregon
    plan: starter
    rootDir: server
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    # preDeployCommand runs after build, in the runtime environment where the
    # preview DB is fully provisioned and reachable. Running pg_dump | psql in
    # buildCommand was unreliable because the build container's connectivity
    # to the freshly-created preview DB is racy — the dump would start, COPY
    # a few tables, then drop the SSL connection mid-stream.
    #
    # The retry loop handles two distinct races:
    #   1. Fresh Postgres takes ~1-2 min to accept connections after creation.
    #   2. After pg_dump's --clean rebuilds the schema, the small basic-256mb
    #      DB briefly enters "starting up" mode and rejects connections with
    #      "FATAL: the database system is starting up" — different from
    #      Connection refused. Need to wait both before AND after the dump.
    preDeployCommand: |
      wait_for_db() {
        for i in 1 2 3 4 5 6 7 8; do
          if psql "$PREVIEW_DATABASE_URL" -c 'SELECT 1' >/dev/null 2>&1; then
            echo "Preview DB is ready (attempt $i)"
            return 0
          fi
          echo "Preview DB not ready (attempt $i/8), waiting 15s..."
          sleep 15
        done
        echo "Preview DB never came up after 2 minutes"
        return 1
      }
      wait_for_db
      pg_dump "$STAGING_DATABASE_URL" --no-owner --no-acl --clean --if-exists | psql "$PREVIEW_DATABASE_URL"
      wait_for_db
      python manage.py migrate --noinput
    startCommand: gunicorn asgi:application --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 600 --workers 2
    envVars:
      # Pin Python to 3.11 — matches local dev. Render's default (3.14)
      # has no wheels for several pinned deps (pydantic_core 2.23.4,
      # python-dotenv 1.0.1) so pip falls back to source builds that
      # fail on the read-only Rust cache or silently skip packages.
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DJANGO_SETTINGS_MODULE
        value: settings.previews
      - key: DJANGO_SECRET_KEY
        sync: false
      # Per-PR S3 prefix so previews never collide with each other or with
      # real staging data. RENDER_GIT_PR_NUMBER is auto-set by Render on
      # preview environments.
      - key: S3_LOCATION_PREFIX
        value: previews/pr-${RENDER_GIT_PR_NUMBER}/media
      # Staging DB — used as the source for pg_dump during build only.
      - key: STAGING_DATABASE_URL
        sync: false
      # Preview DB — wired in five forms because previews.py reads them
      # individually and the build script needs the URL for pg_dump dest.
      - key: PREVIEW_DATABASE_URL
        fromDatabase:
          name: preview-coach-database
          property: connectionString
      - key: PREVIEW_DB_NAME
        fromDatabase:
          name: preview-coach-database
          property: database
      - key: PREVIEW_DB_USER
        fromDatabase:
          name: preview-coach-database
          property: user
      - key: PREVIEW_DB_PASSWORD
        fromDatabase:
          name: preview-coach-database
          property: password
      - key: PREVIEW_DB_HOST
        fromDatabase:
          name: preview-coach-database
          property: host
      - key: PREVIEW_DB_PORT
        fromDatabase:
          name: preview-coach-database
          property: port
      # Redis (Valkey) — Celery broker for the sentinel worker.
      - key: PREVIEW_REDIS_URL
        fromService:
          name: preview-coach-redis
          type: keyvalue
          property: connectionString
      # AWS — same creds as staging, same bucket as staging (scoped by prefix).
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_SES_REGION_NAME
        sync: false
      - key: AWS_SES_REGION_ENDPOINT
        sync: false
      - key: AWS_SES_SOURCE_EMAIL
        sync: false
      - key: STAGING_AWS_STORAGE_BUCKET_NAME
        value: discovita-dev-coach-staging
      # FRONTEND_URL is intentionally unset for previews. Render's
      # fromService property: host doesn't resolve for static-site refs,
      # and previews don't need real password-reset email links —
      # common.py defaults FRONTEND_URL to "" which is acceptable here.

  # ---------------------------------------------------------------------------
  # Sentinel — Celery worker for user-note extraction
  # ---------------------------------------------------------------------------
  # Same image as the api, different start command. Memory hygiene flags
  # come from CELERY_WORKER_* settings in server/settings/common.py.
  - type: worker
    name: preview-coach-sentinel
    runtime: python
    region: oregon
    plan: starter
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A celery_config worker --loglevel=INFO
    envVars:
      # Pin Python — same reason as the api service above.
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DJANGO_SETTINGS_MODULE
        value: settings.previews
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: S3_LOCATION_PREFIX
        value: previews/pr-${RENDER_GIT_PR_NUMBER}/media
      - key: PREVIEW_DB_NAME
        fromDatabase:
          name: preview-coach-database
          property: database
      - key: PREVIEW_DB_USER
        fromDatabase:
          name: preview-coach-database
          property: user
      - key: PREVIEW_DB_PASSWORD
        fromDatabase:
          name: preview-coach-database
          property: password
      - key: PREVIEW_DB_HOST
        fromDatabase:
          name: preview-coach-database
          property: host
      - key: PREVIEW_DB_PORT
        fromDatabase:
          name: preview-coach-database
          property: port
      - key: PREVIEW_REDIS_URL
        fromService:
          name: preview-coach-redis
          type: keyvalue
          property: connectionString
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      # SES vars are required by common.py — even though the worker doesn't
      # send emails directly, importing settings fails without them.
      - key: AWS_SES_REGION_NAME
        sync: false
      - key: AWS_SES_REGION_ENDPOINT
        sync: false
      - key: AWS_SES_SOURCE_EMAIL
        sync: false
      - key: STAGING_AWS_STORAGE_BUCKET_NAME
        value: discovita-dev-coach-staging

  # ---------------------------------------------------------------------------
  # Frontend — Vite/React static site
  # ---------------------------------------------------------------------------
  # VITE_* env vars are baked into the bundle at build time; we export them
  # before `npm run build` so each preview's bundle points at its own API.
  - type: web
    name: preview-coach-frontend
    runtime: static
    rootDir: client
    buildCommand: |
      export VITE_COACH_BASE_URL="https://${PREVIEW_API_HOST}/api/v1"
      export VITE_ENV=preview
      npm install
      npm run build
    staticPublishPath: dist
    # SPA route rewrite — without this, refreshing a non-root URL
    # (e.g. /dashboard) would 404 instead of being handled by client routing.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: PREVIEW_API_HOST
        fromService:
          name: preview-coach-api
          type: web
          property: host

  # ---------------------------------------------------------------------------
  # Docs — Docusaurus static site
  # ---------------------------------------------------------------------------
  - type: web
    name: preview-coach-docs
    runtime: static
    rootDir: docs
    buildCommand: |
      npm install
      npm run build
    staticPublishPath: build

  # ---------------------------------------------------------------------------
  # Redis (Valkey) — Celery broker
  # ---------------------------------------------------------------------------
  - type: keyvalue
    name: preview-coach-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
